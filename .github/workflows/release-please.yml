on:
  push:
    branches:
    - main

permissions:
  contents: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    name: '🔖 Release Please'
    runs-on: ubuntu-22.04-arm-4c-l
    steps:
    - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
      with:
        release-type: terraform-module
        token: ${{ secrets.PAT_TOKEN }}