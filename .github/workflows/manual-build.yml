name: Manual Build

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'  
  workflow_dispatch:        

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build provider binary
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -o terraform-provider-microsoft365.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-provider-microsoft365
          path: terraform-provider-microsoft365.exe